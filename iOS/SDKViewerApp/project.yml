name: SDKViewerMobile
options:
  minimumXcodeGenVersion: 2.38.0
packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: 0.9.20
targets:
  SDKViewerMobile:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    info:
      path: App/Resources/Info.plist
    sources:
      - path: App/Sources
    dependencies:
      - package: ZIPFoundation
      - package: SDKViewerApp
        product: SDKViewerApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.intervalmedia.sdkviewermobile
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1

localPackages:
  - .
